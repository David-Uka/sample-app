name: Build, Scan, Push, Deploy (dev)

on:
  push:
    branches: [main]

env:
  IMAGE: ghcr.io/david-uka/sample-app

jobs:
  build-scan-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      short_sha: ${{ steps.vars.outputs.short_sha }}
    steps:
      - uses: actions/checkout@v4

      - id: vars
        run: echo "short_sha=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build local image
        uses: docker/build-push-action@v6
        with:
          context: .
          tags: ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          push: false
          load: true

      - name: Scan image
        uses: anchore/scan-action@v7
        with:
          image: ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
          fail-build: true
          severity-cutoff: high

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:sha-${{ steps.vars.outputs.short_sha }}
            ${{ env.IMAGE }}:dev

  bump-dev-overlay:
    needs: build-scan-push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout gitops-manifests
        uses: actions/checkout@v4
        with:
          repository: David-Uka/gitops-manifests
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops-manifests

      - name: Set up kustomize
        run: |
          curl -s "https://raw.githubusercontent.com/kubernetes-sigs/kustomize/master/hack/install_kustomize.sh" | bash
          sudo mv kustomize /usr/local/bin/

      - name: Bump dev image tag
        working-directory: gitops-manifests/apps/sample-app/overlays/dev
        run: |
          kustomize edit set image ghcr.io/david-uka/sample-app=ghcr.io/david-uka/sample-app:sha-${{ needs.build-scan-push.outputs.short_sha }}

      - name: Commit and push
        working-directory: gitops-manifests
        run: |
          git config user.name "sample-app-ci"
          git config user.email "ci@sample-app"
          git add apps/sample-app/overlays/dev/kustomization.yaml
          if git diff --cached --quiet; then
            echo "no change"
          else
            git commit -m "deploy(dev): sample-app sha-${{ needs.build-scan-push.outputs.short_sha }}"
            git push
          fi
